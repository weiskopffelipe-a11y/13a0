<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libertadores Draft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b;
    --panel:#141210;
    --panel2:#1b1814;
    --border:#332c1f;
    --gold:#d4af37;
    --gold-bright:#f0c94a;
    --gold-dim:#8a6d1f;
    --text:#f4ede0;
    --text-dim:#9a9182;
    --danger:#c0392b;
  }
  body.theme-ucl{
    --bg:#050d24;
    --panel:#0c1c3f;
    --panel2:#122a54;
    --border:#24447d;
    --gold:#ffffff;
    --gold-bright:#eaf2ff;
    --gold-dim:#93add9;
    --text:#eef4ff;
    --text-dim:#8ea3cf;
    --danger:#e0483a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;}
  a{color:inherit;}

  /* ===== Navbar ===== */
  .navbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:#000;border-bottom:2px solid var(--gold);}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .mark{font-size:24px;}
  .brand .txt{font-family:'Archivo Black',sans-serif;font-size:16px;letter-spacing:.02em;color:var(--gold);text-transform:uppercase;}
  .navbar .pill{font-size:11px;font-weight:700;color:var(--text-dim);background:var(--panel2);border:1px solid var(--border);padding:6px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;}

  /* ===== Sub banner ===== */
  .subbanner{background:var(--gold);color:#000;padding:11px 22px;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:800;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;text-align:center;flex-wrap:wrap;}
  .subbanner .dot{width:7px;height:7px;border-radius:50%;background:#000;display:inline-block;}

  .stagebar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:14px 16px 0;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .stagebar .stg{padding:6px 12px;border:1px solid var(--border);border-radius:20px;color:var(--text-dim);background:var(--panel);}
  .stagebar .stg.active{color:#000;background:var(--gold);border-color:var(--gold);}
  .stagebar .stg.done{color:var(--gold);border-color:var(--gold);}

  #app{max-width:1280px;margin:0 auto;}

  /* ===== 3 column layout (draft) ===== */
  .layout3{display:grid;grid-template-columns:400px 1fr;gap:16px;padding:18px 22px 6px;align-items:start;}
  @media(max-width:980px){.layout3{grid-template-columns:1fr;padding:14px 14px 4px;gap:14px;}}
  .pitch-col{position:sticky;top:10px;max-width:380px;}
  @media(max-width:980px){.pitch-col{position:static;max-width:280px;margin:0 auto;width:100%;}}
  .right-col{display:flex;flex-direction:column;gap:14px;}
  .right-panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;max-height:min(46vh,480px);overflow-y:auto;}
  @media(max-width:980px){.right-panel{max-height:none;}}

  .microlabel{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);font-weight:700;margin-bottom:10px;}

  .drawcard{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px;}
  .badge{width:54px;height:54px;border-radius:50%;background:var(--gold);color:#000;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black',sans-serif;font-size:14px;margin-bottom:12px;}
  .drawcard .tname{font-family:'Archivo Black',sans-serif;font-size:22px;line-height:1.15;margin-bottom:4px;}
  .drawcard .tyear{color:var(--gold-bright);font-weight:800;font-size:14px;}
  .drawcard .empty{color:var(--text-dim);font-size:13.5px;line-height:1.6;padding:6px 0 2px;}

  .rerolltxt{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 8px;font-weight:700;}
  .btn{font-family:inherit;font-size:13.5px;font-weight:800;padding:12px 16px;border-radius:8px;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:.03em;}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn-gold{background:var(--gold);color:#000;}
  .btn-gold:hover:not(:disabled){background:var(--gold-bright);}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-outline:hover:not(:disabled){border-color:var(--text-dim);}
  .btn-block{width:100%;}

  .pending-box{margin-top:14px;background:rgba(212,175,55,0.1);border:1px solid var(--gold);border-radius:8px;padding:10px 12px;font-size:12.5px;}
  .pending-box b{color:var(--gold-bright);}
  .pending-box button{margin-top:8px;background:none;border:1px solid var(--border);color:var(--text-dim);font-size:11px;padding:5px 9px;border-radius:6px;cursor:pointer;text-transform:uppercase;font-weight:700;}

  .playerlist{margin-top:16px;border-top:1px solid var(--border);}
  .prow{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--border);cursor:pointer;}
  .prow:hover:not(.disabled){background:var(--panel2);}
  .prow.disabled{opacity:.32;cursor:not-allowed;}
  .prow .num{font-size:11px;color:var(--text-dim);width:20px;font-weight:700;}
  .prow .nm{flex:1;font-weight:700;font-size:14px;}
  .prow .pc{font-size:10.5px;color:var(--text-dim);font-weight:700;letter-spacing:.02em;white-space:nowrap;}
  .prow .ov{font-family:'Archivo Black',sans-serif;font-size:17px;color:var(--gold);width:30px;text-align:right;}

  /* ===== Pitch ===== */
  .pitchhead{background:var(--gold);color:#000;font-family:'Archivo Black',sans-serif;font-size:13px;letter-spacing:.03em;text-transform:uppercase;text-align:center;padding:11px;border-radius:8px 8px 0 0;}
  .pitch-wrap{position:relative;width:100%;aspect-ratio:2/2.85;background:linear-gradient(180deg,#123a24,#0d2a19);border-left:2px solid var(--border);border-right:2px solid var(--border);overflow:hidden;}
  .pitch-wrap::before{content:"";position:absolute;inset:6px;border:2px solid rgba(212,175,55,0.35);border-radius:4px;}
  .pitch-wrap::after{content:"";position:absolute;left:50%;top:50%;width:70px;height:70px;border:2px solid rgba(212,175,55,0.35);border-radius:50%;transform:translate(-50%,-50%);}
  .pitch-hline{position:absolute;left:6px;right:6px;top:50%;height:2px;background:rgba(212,175,55,0.35);}
  .pitch-box{position:absolute;left:50%;width:44%;height:14%;border:2px solid rgba(212,175,55,0.35);transform:translateX(-50%);}
  .pitch-box.top{top:6px;}
  .pitch-box.bottom{bottom:6px;}
  .pitchfoot{background:var(--gold);color:#000;font-family:'Archivo Black',sans-serif;font-size:12px;letter-spacing:.03em;text-transform:uppercase;text-align:center;padding:10px;border-radius:0 0 8px 8px;}

  .slot{position:absolute;transform:translate(-50%,-50%);width:52px;min-height:52px;border:2px dashed rgba(244,237,224,0.4);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;text-align:center;padding:2px;}
  .slot.filled{border:2px solid var(--gold);background:rgba(212,175,55,0.12);border-radius:8px;cursor:pointer;}
  .slot.eligible{border:2px solid var(--gold-bright);background:rgba(240,201,74,0.18);cursor:pointer;animation:pulse 1.3s infinite;}
  .slot.movesrc{border:2px solid #fff;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(240,201,74,0.25);}50%{box-shadow:0 0 0 7px rgba(240,201,74,0.08);}}
  .slot-code{color:rgba(244,237,224,0.55);font-weight:800;letter-spacing:.03em;font-size:10.5px;}
  .slot-name{font-weight:700;line-height:1.1;font-size:10px;color:var(--text);}
  .slot-ovr{color:var(--gold-bright);font-weight:800;font-size:12.5px;}
  @media(max-width:980px){.slot{width:44px;min-height:44px;font-size:8px;}}

  /* ===== Box score (right col) ===== */
  .boxhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .boxhead .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);font-weight:700;}
  .boxhead .cnt{font-family:'Archivo Black',sans-serif;color:var(--gold);font-size:14px;}
  .legend{display:flex;gap:16px;margin-bottom:14px;font-size:11px;color:var(--text-dim);font-weight:700;text-transform:uppercase;}
  .legend span{display:flex;align-items:center;gap:6px;}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .legend .atk{background:var(--gold);}
  .legend .def{background:#c9c2b0;}

  .boxrow{display:flex;justify-content:space-between;align-items:center;padding:11px 2px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;}
  .boxrow:hover.fillable{background:var(--panel2);}
  .boxrow .pc{color:var(--text-dim);font-weight:800;font-size:11px;letter-spacing:.03em;width:40px;}
  .boxrow .pv{flex:1;text-align:right;font-weight:700;}
  .boxrow .pv.empty{color:var(--text-dim);font-weight:400;}
  .boxrow .ov{color:var(--gold);font-weight:800;font-size:12.5px;width:26px;text-align:right;margin-left:8px;}

  .resv-list{margin-top:6px;}
  .resv-row{display:flex;justify-content:space-between;align-items:center;padding:9px 2px;border-bottom:1px solid var(--border);font-size:12.5px;}
  .resv-row .nm{font-weight:600;}
  .resv-row .sub{color:var(--text-dim);font-size:10.5px;}
  .resv-row .ov{color:var(--gold);font-weight:800;}

  .cta-bar{padding:20px 22px 50px;text-align:center;}

  /* ===== Formation select ===== */
  .formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;padding:24px 22px;max-width:900px;margin:0 auto;}
  .formcard{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;text-align:center;}
  .formcard:hover{border-color:var(--gold);}
  .formcard .fname{font-family:'Archivo Black',sans-serif;font-size:22px;color:var(--gold);margin-bottom:8px;}
  .formcard .fdesc{font-size:12px;color:var(--text-dim);line-height:1.5;}
  .fs-title{text-align:center;font-family:'Archivo Black',sans-serif;font-size:20px;padding:24px 22px 0;color:var(--gold);}

  /* ===== Groups / knockout (reuse panel style) ===== */
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px;margin:16px 22px;}
  .panel h2{font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .panel h2 b{color:var(--gold);font-size:15px;text-transform:none;letter-spacing:0;font-family:'Archivo Black',sans-serif;}
  .panel h2 small{color:var(--gold-bright);font-weight:700;text-transform:none;font-size:12px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--border);}
  th{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-dim);}
  td.tname{text-align:left;font-weight:700;}
  tr.me td{color:var(--gold);}
  tr.qualified td.tname::after{content:" ✓";color:var(--gold-bright);}
  .tie{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:16px;}
  .tie .tt{text-transform:uppercase;letter-spacing:.04em;color:var(--gold);font-size:12px;font-weight:800;margin-bottom:10px;}
  .leg{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;}
  .leg .lscore{font-weight:800;color:var(--gold-bright);}
  .aggline{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);font-size:13px;color:var(--text-dim);display:flex;justify-content:space-between;}
  .aggline b{color:var(--gold);}
  .log{max-height:200px;overflow-y:auto;font-size:12.5px;color:var(--text-dim);line-height:1.8;}
  .log div{border-bottom:1px dotted var(--border);padding:3px 0;}
  .log div:first-child{color:var(--text);}
  .end-screen{text-align:center;padding:50px 16px;}
  .end-screen .trophy{font-size:56px;margin-bottom:10px;}
  .end-screen h2{font-family:'Archivo Black',sans-serif;font-size:clamp(22px,5vw,32px);margin:10px 0;color:var(--gold);}
  .end-screen p{color:var(--text-dim);max-width:480px;margin:0 auto 22px;line-height:1.6;font-size:14px;}

  ::-webkit-scrollbar{width:7px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>

/* ===================== HELPERS ===================== */
function makeId(team,player){ return team.team+"-"+team.year+"-"+player.name; }
function rnd(a,b){ return Math.random()*(b-a)+a; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function poisson(lambda){ const L=Math.exp(-lambda); let k=0,p=1; do{k++;p*=Math.random();}while(p>L); return k-1; }
function simulateMatch(strA,strB){
  const diff=strA-strB;
  const lamA=clamp(1.3+diff*0.045,0.15,4.3);
  const lamB=clamp(1.3-diff*0.045,0.15,4.3);
  return [poisson(lamA),poisson(lamB)];
}
function pushLog(msg){ state.log.unshift(msg); if(state.log.length>60) state.log.pop(); }
function getActiveTeamsDB(){ return state.mode==="ucl" ? CHAMPIONS_TEAMS : LIBERTADORES_TEAMS; }
function getActiveRivalClubs(){ return state.mode==="ucl" ? RIVAL_CLUBS_UCL : RIVAL_CLUBS_LIBER; }
function compName(){ return state.mode==="ucl" ? "Champions League" : "Libertadores"; }
function randomRivalTeam(){
  const list = getActiveRivalClubs();
  const club = list[Math.floor(Math.random()*list.length)];
  const year = Math.floor(rnd(1985,2024));
  return {name: club.name+" "+year, tier: club.tier, flag: COUNTRY_FLAGS[club.name]||"🏳️"};
}
function badgeInitials(name){
  const skip=new Set(["de","da","do","dos","das","e"]);
  const words = name.split(" ").filter(w=>!skip.has(w.toLowerCase()));
  let s = words.slice(0,3).map(w=>w[0]).join("").toUpperCase();
  if(s.length<2) s = name.slice(0,3).toUpperCase();
  return s;
}
function isDraftComplete(){ return state.starterSlots.every(s=>s.filled); }
function isPlayerUsed(id){
  return state.starterSlots.some(s=>s.filled && s.filled.id===id);
}
function emptyStarterCodes(excludeIdx){
  const set=new Set();
  state.starterSlots.forEach((s,i)=>{ if(!s.filled && i!==excludeIdx) set.add(s.code); });
  return set;
}
function canSelectPlayer(p,id){
  if(isPlayerUsed(id)) return false;
  if(isDraftComplete()) return false;
  const empties = emptyStarterCodes(-1);
  return p.pos.some(c=>empties.has(c));
}
function getAltYearTeam(t){
  return getActiveTeamsDB().find(x=> x.team===t.team && x.year!==t.year);
}
function teamStrength(){
  const filled = state.starterSlots.filter(s=>s.filled);
  if(filled.length===0) return 0;
  const avg = filled.reduce((s,x)=>s+x.filled.ovr,0)/filled.length;
  return Math.round(avg*10)/10;
}

function renderChrome(){

  brandMark.textContent = state.mode==="ucl" ? "⭐" : "🏆";

    navPill.textContent="Bem-vindo";

    sub.innerHTML = `<span class="dot"></span> ${compName().toUpperCase()} · ESCOLHA A DIFICULDADE`;
  } else if(state.phase==="formation"){
    navPill.textContent="Formação";
    sub.innerHTML = `<span class="dot"></span> ${compName().toUpperCase()} · ESCOLHA SUA FORMAÇÃO TÁTICA`;
  } else if(state.phase==="draft"){
    const filled = state.starterSlots.filter(s=>s.filled).length;
    navPill.textContent = filled+"/11 titulares";
    sub.innerHTML = `<span class="dot"></span> ${compName().toUpperCase()} · FORMAÇÃO ${state.formationKey} · ${state.rerollsLeft} RE-SORTEIOS RESTANTES (JOGO TODO)`;
  } else if(state.phase==="groups"){
    navPill.textContent="Fase de Grupos";
    sub.innerHTML = `<span class="dot"></span> ${compName().toUpperCase()} · FASE DE GRUPOS`;
  } else if(state.phase==="knockout"){
    navPill.textContent = STAGES[1+state.knockout.stageIdx];
    sub.innerHTML = `<span class="dot"></span> ${compName().toUpperCase()} · ${STAGES[1+state.knockout.stageIdx].toUpperCase()}`;
  } else if(state.phase==="end"){
    navPill.textContent = state.finalResult==="champion" ? "Campeão" : "Eliminado";
    sub.innerHTML = state.finalResult==="champion" ? `<span class="dot"></span> CAMPEÃO DA ${compName().toUpperCase()}` : `<span class="dot"></span> ELIMINADO DA ${compName().toUpperCase()}`;
  }
}
function renderStagebar(){
  const bar=document.getElementById("stagebar");
  if(state.phase==="landing" || state.phase==="mode" || state.phase==="difficulty"){ bar.innerHTML=""; return; }
  let idxCurrent=-2;
  if(state.phase==="formation") idxCurrent=-2;
  else if(state.phase==="draft") idxCurrent=-1;
  else if(state.phase==="groups") idxCurrent=0;
  else if(state.phase==="knockout") idxCurrent=1+state.knockout.stageIdx;
  else if(state.phase==="end") idxCurrent = state.finalResult==="champion" ? 5 : (1+(state.knockout?state.knockout.stageIdx:0));
  bar.innerHTML = STAGES.map((s,i)=>{
    let cls="stg";
    if(state.phase==="end" && state.finalResult==="champion") cls+=" done";
    else if(i<idxCurrent) cls+=" done";
    else if(i===idxCurrent) cls+=" active";
    return `<div class="${cls}">${s}</div>`;
  }).join("");
}

  let playerListHtml = "";
  let rerollBtnsHtml = "";

      <div class="drawcard">

      <div class="microlabel" id="playerListAnchor" style="margin-top:4px;">Escolha um jogador</div>

        ${t.players.map((p,i)=>{
          const id = makeId(t,p);
          const used = isPlayerUsed(id);
          const can = canSelectPlayer(p,id);
          return `<div class="prow ${can?"":"disabled"}" data-pick="${id}">
            <div class="num">#${i+1}</div>
            <div class="nm">${p.name}</div>
            <div class="pc">${p.pos.map(c=>POS_LABEL[c]).join("/")}${used?" · escalado":(!can?" · sem vaga":"")}</div>

          </div>`;

      pendingHtml = `<div class="pending-box"><b>${state.pending.player.name}</b> selecionado — clique numa posição dourada piscando no campo para escalar.</div>`;
    } else {
      pendingHtml = `<div class="pending-box">Movendo <b>${state.pending.player.name}</b> — clique numa posição dourada piscando para reposicionar, ou clique nele de novo para cancelar.</div>`;

function renderPitch(){
  return `<div class="pitch-wrap"><div class="pitch-hline"></div><div class="pitch-box top"></div><div class="pitch-box bottom"></div>
    ${state.starterSlots.map((s,i)=>{
      let eligible = false;
      if(state.pending){
        if(state.pending.type==="new") eligible = !s.filled && state.pending.player.pos.includes(s.code);
        else eligible = !s.filled && state.pending.player.pos.includes(s.code);
      }
      const isMoveSrc = state.pending && state.pending.type==="move" && state.pending.fromSlot===i;
      const cls = "slot"+(s.filled?" filled":"")+(eligible?" eligible":"")+(isMoveSrc?" movesrc":"");
      const content = s.filled ? `<div class="slot-name">${s.filled.name}</div><div class="slot-ovr">${s.filled.ovr}</div>` : `<div class="slot-code">${POS_LABEL[s.code]}</div>`;
      return `<div class="${cls}" style="left:${s.x}%; top:${s.y}%;" data-slot="${i}">${content}</div>`;
    }).join("")}
  </div>`;
}
function rollDice(){
  if(state.revealedTeam || isDraftComplete()) return; // só 1 sorteio por vez — precisa resolver o atual primeiro
  state.pending=null;
  const db = getActiveTeamsDB();
  state.revealedTeam = db[Math.floor(Math.random()*db.length)];
  render();
  scrollToPlayerList();
}
function rerollDifferentTeam(){
  if(!state.revealedTeam || state.pending || state.rerollsLeft<=0) return;
  state.rerollsLeft--;
  const db = getActiveTeamsDB();
  let next;
  do{ next = db[Math.floor(Math.random()*db.length)]; }
  while(db.length>1 && next.team===state.revealedTeam.team && next.year===state.revealedTeam.year);
  state.revealedTeam = next;
  render();
  scrollToPlayerList();
}
function rerollSameTeamOtherYear(){
  if(!state.revealedTeam || state.pending || state.rerollsLeft<=0) return;
  const alt = getAltYearTeam(state.revealedTeam);
  if(!alt) return;
  state.rerollsLeft--;
  state.revealedTeam = alt;
  render();
  scrollToPlayerList();
}
function scrollToPlayerList(){
  requestAnimationFrame(()=>{
    const el = document.getElementById("playerListAnchor");
    if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
  });
}
function selectPlayer(id){
  const t=state.revealedTeam; if(!t) return;
  const p = t.players.find(pl=>makeId(t,pl)===id);
  if(!p || !canSelectPlayer(p,id)) return;
  const playerObj = {id, name:p.name, pos:p.pos, ovr:p.ovr, team:t.team, year:t.year};
  state.pending = {type:"new", player:playerObj};
  render();
  scrollToPitch();
}
function scrollToPitch(){
  requestAnimationFrame(()=>{
    const el = document.querySelector(".pitch-col");
    if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
  });
}
function slotClicked(idx){
  const slot = state.starterSlots[idx];
  // click on a filled slot: initiate or cancel a move
  if(slot.filled){
    if(state.pending && state.pending.type==="move" && state.pending.fromSlot===idx){
      state.pending=null; render(); return;
    }
    const others = emptyStarterCodes(idx);
    const canMove = slot.filled.pos.some(c=>others.has(c));
    if(canMove){
      state.pending = {type:"move", player:slot.filled, fromSlot:idx};
      render();
    }
    return;
  }
  // click on an empty slot: finalize placement if eligible
  if(!state.pending) return;
  if(!state.pending.player.pos.includes(slot.code)) return;
  if(state.pending.type==="new"){
    slot.filled = state.pending.player;
    state.pending=null; state.revealedTeam=null;
    render();
    scrollToDrawPanel();
    return;
  } else {
    state.starterSlots[state.pending.fromSlot].filled = null;
    slot.filled = state.pending.player;
    state.pending=null;
  }
  render();
}
function scrollToDrawPanel(){
  requestAnimationFrame(()=>{
    const el = document.querySelector(".right-col");
    if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
  });
}
function resetDraft(){
  state.phase="formation"; state.formationKey=null; state.starterSlots=[];
  state.rerollsLeft=MAX_REROLLS; state.revealedTeam=null; state.pending=null;
  render();
}
function fullRestart(){
  state.phase="mode"; state.mode=null; state.difficulty=null; state.formationKey=null; state.starterSlots=[];
  state.rerollsLeft=MAX_REROLLS; state.revealedTeam=null; state.pending=null;
  state.group=null; state.knockout=null; state.finalResult=null; state.log=[];
  render();
}

/* ===================== GRUPOS ===================== */
function startTournament(){
  const myStrength = teamStrength();
  const opps=[1,2,3].map(()=>{
    const rival = randomRivalTeam();
    const cap = TIER_CAPS[rival.tier];
    const desired = myStrength - 16 + rnd(0,8);
    return {name:rival.name+" "+rival.flag, str:Math.round(clamp(desired, cap.min, cap.max))};
  });
  const teams=[{name:"Meu Time",str:myStrength,mine:true}, ...opps.map(o=>({name:o.name,str:o.str,mine:false}))];
  const rounds=[[[0,1],[2,3]],[[0,2],[3,1]],[[0,3],[1,2]],[[1,0],[3,2]],[[2,0],[1,3]],[[3,0],[2,1]]];
  state.group={ teams, table:teams.map(()=>({pts:0,w:0,d:0,l:0,gf:0,ga:0})), rounds, roundIdx:0, finished:false };
  state.phase="groups";
  pushLog("A fase de grupos começou! Seu time (OVR "+myStrength+") caiu num grupo com "+opps.map(o=>o.name).join(", ")+".");
  render();
}
function simulateMyGroupMatch(){
  const g=state.group;
  if(g.roundIdx>=g.rounds.length) return;
  const round = g.rounds[g.roundIdx];
  round.forEach(([h,a])=>{
    const th=g.teams[h], ta=g.teams[a];
    const [gh,ga]=simulateMatch(th.str,ta.str);
    const tabH=g.table[h], tabA=g.table[a];
    tabH.gf+=gh; tabH.ga+=ga; tabA.gf+=ga; tabA.ga+=gh;
    if(gh>ga){tabH.w++;tabH.pts+=3;tabA.l++;}
    else if(gh<ga){tabA.w++;tabA.pts+=3;tabH.l++;}
    else{tabH.d++;tabA.d++;tabH.pts++;tabA.pts++;}
    const involvesMe = th.mine || ta.mine;
    pushLog((involvesMe?"⭐ ":"")+`${th.name} ${gh} x ${ga} ${ta.name}`);
  });
  g.roundIdx++;
  if(g.roundIdx>=g.rounds.length){ g.finished=true; evaluateGroupResult(); }
  render();
}
function evaluateGroupResult(){
  const g=state.group;
  const ranked=g.teams.map((t,i)=>({...t, idx:i, ...g.table[i]})).sort((a,b)=> b.pts-a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf-a.gf);
  g.ranked=ranked;
  const myRank=ranked.findIndex(t=>t.mine);
  if(myRank<=1){
    pushLog(`Classificado em ${myRank+1}º lugar do grupo! Rumo às oitavas de final.`);
    state.knockout={ stageIdx:0, opponent:null, leg1:null, leg2:null, aggMine:0, aggOpp:0, resolved:false, wentToPens:false, wonPens:null, myStrength:teamStrength() };
    generateKnockoutOpponent();
    state.phase="knockout";
  } else {
    pushLog(`Eliminado na fase de grupos, terminando em ${myRank+1}º lugar.`);
    state.finalResult="eliminated-groups";
    state.phase="end";
  }
}
function renderGroups(){
  const g=state.group;
  const rows = g.teams.map((t,i)=>({name:t.name, mine:t.mine, ...g.table[i]})).sort((a,b)=> b.pts-a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf-a.gf);
  const tableHtml = `<table><thead><tr><th style="text-align:left;">Time</th><th>P</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr></thead>
    <tbody>${rows.map((r,i)=>`<tr class="${r.mine?'me':''} ${i<2 && g.finished?'qualified':''}">
      <td class="tname">${r.name}</td><td>${r.pts}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td><td>${r.gf}</td><td>${r.ga}</td><td>${r.gf-r.ga}</td></tr>`).join("")}</tbody></table>`;
  const canSim = !g.finished && g.roundIdx<g.rounds.length;
  return `
    <div class="panel">
      <h2><b>Fase de Grupos</b> <small>Rodada ${Math.min(g.roundIdx+(canSim?1:0), g.rounds.length)}/${g.rounds.length}</small></h2>
      ${tableHtml}
      <div style="margin-top:16px;">
        <button class="btn btn-gold btn-block" id="simRoundBtn" ${canSim?"":"disabled"}>
          ${canSim ? `Simular meu próximo jogo (Rodada ${g.roundIdx+1}/${g.rounds.length})` : "Fase de Grupos Encerrada"}
        </button>
      </div>
    </div>
    <div class="panel"><h2><b>Súmula</b></h2><div class="log">${state.log.slice(0,14).map(l=>`<div>${l}</div>`).join("")}</div></div>
  `;
}

/* ===================== MATA-MATA ===================== */
function generateKnockoutOpponent(){
  const k=state.knockout;
  // A cada fase o adversário melhora bastante: Oitavas ainda ok -> Quartas dura -> Semi muito dura -> Final quase impossível
  const rival = randomRivalTeam();
  const cap = TIER_CAPS[rival.tier];
  const desired = k.myStrength - 6 + (k.stageIdx*12) + rnd(-2,10);
  k.opponent={name:rival.name+" "+rival.flag, str:Math.round(clamp(desired, cap.min, cap.max))};
  k.leg1=null; k.leg2=null; k.aggMine=0; k.aggOpp=0; k.resolved=false; k.wentToPens=false; k.wonPens=null;
}
function simulateKnockoutLeg(legNum){
  const k=state.knockout;
  const isFinal = k.stageIdx===3;
  if(isFinal){
    const [gm,go]=simulateMatch(k.myStrength,k.opponent.str);
    k.leg1={home:"Meu Time",away:k.opponent.name,gh:gm,ga:go,neutral:true};
    k.aggMine=gm; k.aggOpp=go;
    pushLog(`FINAL — Meu Time ${gm} x ${go} ${k.opponent.name}`);
    resolveKnockout(); return;
  }
  if(legNum===1){
    const [gm,go]=simulateMatch(k.myStrength,k.opponent.str);
    k.leg1={home:"Meu Time",away:k.opponent.name,gh:gm,ga:go};
    k.aggMine+=gm; k.aggOpp+=go;
    pushLog(`${STAGES[1+k.stageIdx]} (Ida) — Meu Time ${gm} x ${go} ${k.opponent.name}`);
  } else {
    const [go,gm]=simulateMatch(k.opponent.str,k.myStrength);
    k.leg2={home:k.opponent.name,away:"Meu Time",gh:go,ga:gm};
    k.aggMine+=gm; k.aggOpp+=go;
    pushLog(`${STAGES[1+k.stageIdx]} (Volta) — ${k.opponent.name} ${go} x ${gm} Meu Time`);
    resolveKnockout();
  }
  render();
}
function resolveKnockout(){
  const k=state.knockout;
  let myWin;
  if(k.aggMine===k.aggOpp){
    k.wentToPens=true;
    const probMine = clamp(0.5+(k.myStrength-k.opponent.str)*0.012,0.28,0.72);
    myWin = Math.random()<probMine;
    k.wonPens=myWin;
    pushLog(myWin?`Vitória nos pênaltis contra ${k.opponent.name}!`:`Derrota nos pênaltis para ${k.opponent.name}.`);
  } else { myWin = k.aggMine>k.aggOpp; }
  k.resolved=true;
  if(myWin){
    pushLog(`Classificado para a próxima fase!`);
    if(k.stageIdx===3){ state.finalResult="champion"; state.phase="end"; }
  } else {
    pushLog(`Eliminado n${STAGES[1+k.stageIdx]==="Oitavas"?"as":"a"} ${STAGES[1+k.stageIdx]}.`);
    state.finalResult="eliminated-knockout";
    state.phase="end";
  }
  render();
}
function advanceKnockout(){ state.knockout.stageIdx++; generateKnockoutOpponent(); render(); }
function renderKnockout(){
  const k=state.knockout;
  const stageName=STAGES[1+k.stageIdx];
  const isFinal=k.stageIdx===3;
  let legsHtml="";
  if(isFinal){
    legsHtml = k.leg1 ? `
      <div class="leg"><span>Meu Time</span><span class="lscore">${k.leg1.gh} x ${k.leg1.ga}</span><span>${k.opponent.name}</span></div>
      ${k.wentToPens?`<div class="aggline"><span>Decidido nos pênaltis</span><b>${k.wonPens?"Meu Time venceu":k.opponent.name+" venceu"}</b></div>`:""}
    ` : `<div style="color:var(--text-dim);font-size:13.5px;">Jogo único, em campo neutro.</div>`;
  } else {
    legsHtml = `
      ${k.leg1?`<div class="leg"><span>Ida: Meu Time</span><span class="lscore">${k.leg1.gh} x ${k.leg1.ga}</span><span>${k.opponent.name}</span></div>`:`<div style="color:var(--text-dim);font-size:13px;">Jogo de ida ainda não disputado.</div>`}
      ${k.leg2?`<div class="leg"><span>Volta: ${k.opponent.name}</span><span class="lscore">${k.leg2.gh} x ${k.leg2.ga}</span><span>Meu Time</span></div>`:""}
      ${k.leg1 && k.leg2 ? `<div class="aggline"><span>Agregado</span><b>Meu Time ${k.aggMine} x ${k.aggOpp} ${k.opponent.name}</b></div>`:""}
      ${k.wentToPens?`<div class="aggline"><span>Decidido nos pênaltis</span><b>${k.wonPens?"Meu Time venceu":k.opponent.name+" venceu"}</b></div>`:""}
    `;
  }
  let actionBtn="";
  if(!k.resolved){
    if(isFinal) actionBtn = k.leg1 ? "" : `<button class="btn btn-gold btn-block" id="simLegBtn" data-leg="1">Simular a Final</button>`;
    else if(!k.leg1) actionBtn = `<button class="btn btn-gold btn-block" id="simLegBtn" data-leg="1">Simular Jogo de Ida</button>`;
    else if(!k.leg2) actionBtn = `<button class="btn btn-gold btn-block" id="simLegBtn" data-leg="2">Simular Jogo de Volta</button>`;
  } else {
    actionBtn = `<button class="btn btn-gold btn-block" id="nextStageBtn">Avançar para ${STAGES[2+k.stageIdx]||""} ➜</button>`;
  }
  return `
    <div class="panel">
      <h2><b>${stageName}</b> <small>Meu Time ${k.myStrength} × ${k.opponent.name} ${k.opponent.str}</small></h2>
      <div class="tie"><div class="tt">${isFinal?"Jogo Único — Campo Neutro":"Confronto de ida e volta"}</div>${legsHtml}</div>
      <div style="margin-top:14px;">${actionBtn}</div>
    </div>
    <div class="panel"><h2><b>Súmula</b></h2><div class="log">${state.log.slice(0,14).map(l=>`<div>${l}</div>`).join("")}</div></div>
  `;
}

/* ===================== FIM DE JOGO ===================== */
function renderEnd(){
  if(state.finalResult==="champion"){
    return `<div class="panel end-screen"><div class="trophy">${state.mode==="ucl"?"⭐":"🏆"}</div><h2>CAMPEÃO DA ${compName().toUpperCase()}!</h2>
      <p>Seu elenco, montado com craques de diferentes clubes e épocas, conquistou o título continental. Um time histórico que nunca existiu, forjado por você.</p>
      <button class="btn btn-gold" id="restartBtn">Montar um novo time</button></div>`;
  }
  const stageLost = state.knockout ? STAGES[1+state.knockout.stageIdx] : "Fase de Grupos";
  return `<div class="panel end-screen"><div class="trophy">⚽</div><h2>Eliminado — ${stageLost}</h2>
    <p>Sua jornada terminou aqui. Monte um novo elenco combinando outros craques de diferentes anos e tente novamente pelo título da ${compName()}.</p>
    <button class="btn btn-gold" id="restartBtn">Tentar novamente</button></div>`;
}

/* ===================== EVENTOS ===================== */
function bindEvents(){
  const landingStartBtn=document.getElementById("landingStartBtn"); if(landingStartBtn) landingStartBtn.onclick=()=>{ state.phase="mode"; render(); };
  document.querySelectorAll("[data-mode]").forEach(el=>{ el.onclick = ()=> chooseMode(el.getAttribute("data-mode")); });
  document.querySelectorAll("[data-difficulty]").forEach(el=>{ el.onclick = ()=> chooseDifficulty(el.getAttribute("data-difficulty")); });
  document.querySelectorAll("[data-formation]").forEach(el=>{ el.onclick = ()=> chooseFormation(el.getAttribute("data-formation")); });
  const rollBtn=document.getElementById("rollBtn"); if(rollBtn) rollBtn.onclick=rollDice;
  const rerollTeamBtn=document.getElementById("rerollTeamBtn"); if(rerollTeamBtn) rerollTeamBtn.onclick=rerollDifferentTeam;
  const rerollYearBtn=document.getElementById("rerollYearBtn"); if(rerollYearBtn) rerollYearBtn.onclick=rerollSameTeamOtherYear;
  document.querySelectorAll("[data-pick]").forEach(row=>{ row.onclick=()=>selectPlayer(row.getAttribute("data-pick")); });
  document.querySelectorAll("[data-slot]").forEach(el=>{ el.onclick=()=>slotClicked(parseInt(el.getAttribute("data-slot"))); });
  document.querySelectorAll("[data-slotmove]").forEach(el=>{ el.onclick=()=>slotClicked(parseInt(el.getAttribute("data-slotmove"))); });
  const resetDraftBtn=document.getElementById("resetDraftBtn"); if(resetDraftBtn) resetDraftBtn.onclick=resetDraft;
  const startBtn=document.getElementById("startBtn"); if(startBtn) startBtn.onclick=startTournament;
  const simRoundBtn=document.getElementById("simRoundBtn"); if(simRoundBtn) simRoundBtn.onclick=simulateMyGroupMatch;
  const simLegBtn=document.getElementById("simLegBtn"); if(simLegBtn) simLegBtn.onclick=()=>simulateKnockoutLeg(parseInt(simLegBtn.getAttribute("data-leg")));
  const nextStageBtn=document.getElementById("nextStageBtn"); if(nextStageBtn) nextStageBtn.onclick=advanceKnockout;
  const restartBtn=document.getElementById("restartBtn"); if(restartBtn) restartBtn.onclick=fullRestart;
}

render();
</script>
</body>
</html>
